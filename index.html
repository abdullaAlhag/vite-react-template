<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Medical Equipment Catalog</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		// إعدادات Tailwind لتخصيص الألوان إذا أردت

			theme: {
				extend: {
					colors: {
						primary: '#2196F3', // لون أزرق طبي

				}
			}
		}
	</script>
</head>
<body>
	<div id="root"></div>
	<script type="module" src="/src/react-app/main.tsx"></script>
</body>
</html>
